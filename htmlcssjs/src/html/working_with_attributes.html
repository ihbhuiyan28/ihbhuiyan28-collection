<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice App</title>
</head>

<body>

    <button type="button">Button</button>

    <script>
        const btn = document.querySelector("button");
        console.log(btn);

        const setAttr = btn.setAttribute("type", "submit");
        console.log(setAttr);

        btn.setAttribute("disabled", "");

        const attr = btn.getAttribute("type");
        console.log(attr);

        const removeAttr = btn.removeAttribute("disabled");
        console.log(removeAttr);

        const hasAttr = btn.hasAttribute("type");
        console.log(hasAttr);
    </script>
</body>

</html>
